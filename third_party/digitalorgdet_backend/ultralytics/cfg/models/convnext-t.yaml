# convnext_fpn_sppf_tiny.yaml
nc: 1
ch: 3
depth_multiple: 1.0
width_multiple: 1.0
scale: t
scales: {t: [1.0, 1.0, 768]}  # Tiny 的最高主干通道是 768

backbone:
  - [-1, 1, ConvNeXtV1, [1, "tiny", 3, "'${DIGITALORGDET_TINY_BACKBONE}'", [0, 1, 2, 3]]]
  - [0, 1, Index, [96,  0]]    # P2:  96
  - [0, 1, Index, [192, 1]]    # P3: 192
  - [0, 1, Index, [384, 2]]    # P4: 384
  - [0, 1, Index, [768, 3]]    # P5: 768

head:
  - [4, 1, Conv,  [256, 1, 1]]                 # 768 -> 256
  - [5, 1, SPPF,  [256, 5]]
  - [6, 1, nn.Upsample, [None, 2, 'nearest']]
  - [3, 1, Conv,  [256, 1, 1]]                 # 384 -> 256
  - [[8, 7], 1, Concat, [1]]
  - [9, 3, C2f,  [256, True]]                  # P4_td 256

  - [10, 1, nn.Upsample, [None, 2, 'nearest']]
  - [2,  1, Conv,  [128, 1, 1]]                # 192 -> 128
  - [[12, 11], 1, Concat, [1]]
  - [13, 3, C2f,  [128, True]]                 # P3_td 128

  - [14, 1, nn.Upsample, [None, 2, 'nearest']]
  - [1,  1, Conv,  [64, 1, 1]]                  # 96 -> 64
  - [[16, 15], 1, Concat, [1]]
  - [17, 3, C2f,  [64, True]]                  # P2_out 64

  - [18, 1, Conv,  [64, 3, 2]]
  - [[19, 14], 1, Concat, [1]]
  - [20, 3, C2f,  [128, True]]                 # P3_out 128

  - [21, 1, Conv,  [128, 3, 2]]
  - [[22, 10], 1, Concat, [1]]
  - [23, 3, C2f,  [256, True]]                 # P4_out 256

  - [24, 1, Conv,  [256, 3, 2]]
  - [[25, 6], 1, Concat, [1]]
  - [26, 3, C2f,  [512, True]]                 # P5_out 512

  - [[18, 21, 24, 27], 1, Detect, [nc]]
